name: "@foundrynet/academic-intel-mcp"
displayName: "FoundryNet Academic Intelligence"
description: >-
  Research paper search across Semantic Scholar, arXiv, and PubMed with citation analysis, author profiles, and semantic similar-paper discovery.
icon: "🎓"
homepage: "https://foundrynet.io"
repository: "https://github.com/FoundryNet/academic-intel-mcp"
license: "MIT"
categories:
  - research
  - data
  - education
tags:
  - research-papers
  - academic-search
  - arxiv
  - pubmed
  - semantic-scholar
  - citation-analysis
  - literature-review
keywords:
  - research-papers
  - academic-search
  - arxiv
  - pubmed
  - semantic-scholar
  - citation-analysis
  - literature-review
attestation:
  protocol: "MINT Protocol"
  verified_outputs: true
  live_feed: "https://mint.foundrynet.io/feed"
network:
  name: "FoundryNet Data Network"
  servers: 17
startCommand:
  type: http
  url: "https://academic-intel-mcp-production.up.railway.app/mcp"
  transport: streamable-http
  configSchema:
    type: object
    properties:
      api_key:
        type: string
        title: "Forge billing key (optional)"
        description: "fnet_ key to bypass the per-query x402 paywall and bill to a Forge account."
